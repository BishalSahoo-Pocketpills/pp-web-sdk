<!--
  ============================================================
  PocketPills Braze — Webflow Copy-Paste Snippets
  ============================================================
  Copy these snippets into your Webflow custom code sections.
  Replace placeholder values (YOUR_BRAZE_API_KEY, etc.) with
  your actual credentials.
  ============================================================
-->


<!-- =========================================================
     SNIPPET 1: Site-Level Script Setup
     WHERE: Settings → Custom Code → Footer Code
     ========================================================= -->

<!-- Load the PocketPills SDK (common core + Braze module) -->
<script src="https://your-cdn.com/common.min.js"></script>
<script src="https://your-cdn.com/braze.min.js"></script>

<!-- Configure and initialize Braze -->
<script>
  ppLib.braze.configure({
    sdk: {
      apiKey: 'YOUR_BRAZE_API_KEY',       // From Braze dashboard → Settings → API Keys
      baseUrl: 'sdk.iad-01.braze.com'     // From Braze dashboard → Manage Settings
    }
  });
  ppLib.braze.init();
</script>


<!-- =========================================================
     SNIPPET 2: Lead Capture Form
     WHERE: Webflow Designer → Form Block custom attributes
     NOTE: Add each attribute to the correct element (form vs input)
     ========================================================= -->

<!--
  On the Form Block element, add custom attribute:
    data-braze-form = "lead_capture"

  On each Input element, add custom attribute:
    data-braze-attr = "<field_name>"
-->
<form data-braze-form="lead_capture">
  <!-- Standard Braze user attributes -->
  <input data-braze-attr="email" name="email" type="email"
         placeholder="Email address" />

  <input data-braze-attr="first_name" name="first_name" type="text"
         placeholder="First name" />

  <input data-braze-attr="phone" name="phone" type="tel"
         placeholder="Phone number" />

  <!-- Custom attribute: use "custom:" prefix -->
  <input data-braze-attr="custom:preferred_pharmacy" name="pharmacy" type="text"
         placeholder="Preferred pharmacy" />

  <button type="submit">Subscribe</button>
</form>
<!-- Result: sets email, first_name, phone on Braze user profile,
     sets "preferred_pharmacy" as a custom attribute,
     fires event "form_submitted_lead_capture" -->


<!-- =========================================================
     SNIPPET 3: CTA Button with Event Tracking
     WHERE: Webflow Designer → Button/Link custom attributes
     ========================================================= -->

<!--
  Add these custom attributes to the Button element:
    data-braze-event      = "started_signup"
    data-braze-prop-source = "hero_banner"
    data-braze-prop-plan   = "premium"
-->
<button
  data-braze-event="started_signup"
  data-braze-prop-source="hero_banner"
  data-braze-prop-plan="premium">
  Get Started
</button>
<!-- Result: on click, fires logCustomEvent("started_signup", {
     source: "hero_banner", plan: "premium",
     page_url: "...", page_path: "...", page_title: "..."
   }) -->


<!-- =========================================================
     SNIPPET 4: Purchase Button
     WHERE: Webflow Designer → Button custom attributes
     ========================================================= -->

<!--
  Add these custom attributes to the Button element:
    data-braze-purchase  = "assessment-pkg"
    data-braze-price     = "60"
    data-braze-currency  = "CAD"
    data-braze-quantity  = "1"
-->
<button
  data-braze-purchase="assessment-pkg"
  data-braze-price="60"
  data-braze-currency="CAD"
  data-braze-quantity="1">
  Buy Assessment Package — $60
</button>
<!-- Result: on click, fires logPurchase("assessment-pkg", 60, "CAD", 1) -->


<!-- =========================================================
     SNIPPET 5: Dual Tracking Button (Event Source + Braze Event)
     WHERE: Webflow Designer → Button custom attributes
     NOTE: If you use both pp-analytics event-source module AND
           Braze event tracking, you can put both sets of attributes
           on the same element.
     ========================================================= -->

<!--
  pp-analytics event-source tracking:
    data-event-source = "hero_cta"

  Braze event tracking:
    data-braze-event       = "clicked_hero_cta"
    data-braze-prop-variant = "B"
-->
<button
  data-event-source="hero_cta"
  data-braze-event="clicked_hero_cta"
  data-braze-prop-variant="B">
  Start Your Assessment
</button>
<!-- Result: fires both the pp-analytics event-source tracking AND
     a Braze logCustomEvent("clicked_hero_cta", { variant: "B", ... }) -->
