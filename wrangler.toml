# Cloudflare Pages configuration
# Connect this repo in Cloudflare Dashboard → Pages → Create project
#
# Build settings (also configurable in dashboard):
#   Build command: npm run build
#   Build output directory: dist
#   Root directory: /
#
# Cloudflare Pages will:
# 1. Pull from your private GitHub repo on push to main
# 2. Run `npm install` + `npm run build`
# 3. Deploy dist/ to Cloudflare's CDN
#
# Each deploy gets:
#   - Production URL: https://<project>.pages.dev/
#   - Immutable URL:  https://<hash>.<project>.pages.dev/ (for version pinning)

name = "pp-web-sdk"
compatibility_date = "2026-03-07"
workers_dev = true
preview_urls = false

[assets]
directory = "./dist"
