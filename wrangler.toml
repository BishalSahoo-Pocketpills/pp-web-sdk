# Cloudflare Workers config — per-environment, fail-safe by design.
#
# THE TOP-LEVEL `name` IS A NON-PROD PLACEHOLDER ON PURPOSE.
# A bare `wrangler deploy` (someone forgot --env / --name) lands on the
# throwaway `pp-sdk-unbound` Worker — NEVER on production. Every real
# deploy MUST pass an environment:
#
#   wrangler deploy --env staging      → pp-sdk-staging
#   wrangler deploy --env canary       → pp-sdk-canary
#   wrangler deploy --env production   → pp-web-sdk   (PRODUCTION)
#
# Cloudflare Workers Builds: each Worker's build Deploy command MUST use
# its --env flag (or --name <worker>). The branch → Worker wiring:
#   bishal/staging → pp-sdk-staging   (deploy cmd: npx wrangler deploy --env staging)
#   bishal/canary  → pp-sdk-canary    (deploy cmd: npx wrangler deploy --env canary)
#   bishal/main    → pp-web-sdk        (deploy cmd: npx wrangler deploy --env production)
#
# See docs/RELEASE-DEPLOY.md for the full model.

name = "pp-sdk-unbound"
compatibility_date = "2026-03-07"
workers_dev = true

[assets]
directory = "./dist"

# ---------------------------------------------------------------------------
# Staging — bishal/staging → *.webflow.io
# ---------------------------------------------------------------------------
[env.staging]
name = "pp-sdk-staging"
workers_dev = true

[env.staging.assets]
directory = "./dist"

# ---------------------------------------------------------------------------
# Canary — bishal/canary → test pages / cohort
# ---------------------------------------------------------------------------
[env.canary]
name = "pp-sdk-canary"
workers_dev = true

[env.canary.assets]
directory = "./dist"

# ---------------------------------------------------------------------------
# Production — bishal/main → try.pocketpills.com (mktg) + www.pocketpills.info (core)
# ---------------------------------------------------------------------------
[env.production]
name = "pp-web-sdk"
workers_dev = true

[env.production.assets]
directory = "./dist"
