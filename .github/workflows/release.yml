name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    # Skip CI-triggered commits (version bumps) to prevent infinite loop
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether the diff since the last tag warrants a release
        # The previous workflow shape bumped + tagged + released on every
        # merge to main, including docs-only / CI-only PRs. That created a
        # drift loop: every CHANGELOG-catch-up PR triggered ANOTHER version
        # bump that itself needed another CHANGELOG entry. Now we only
        # release when something that affects consumer behaviour actually
        # changed.
        #
        # Inclusion list (release if ANY of these touched since LAST_TAG):
        #   - src/**           — production source
        #   - build.js, modules.js, prebuild.ts — build outputs change
        #   - tsconfig.json    — emit/compile semantics change
        #   - pnpm-lock.yaml   — dependency tree change (could be transitive)
        #
        # Anything else (docs/**, *.md, .github/**, tests/**, eslint/prettier
        # configs) is considered docs/CI-only and skips the release.
        id: should-release
        run: |
          set -euo pipefail
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag — always release on the first push to main."
            echo "RELEASE=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Use --diff-filter=AMR (added/modified/renamed) so deletes alone
          # don't trip the gate — though most deletes will also touch src/.
          CHANGED=$(git diff --name-only --diff-filter=AMR "${LAST_TAG}..HEAD")
          echo "Files changed since ${LAST_TAG}:"
          echo "${CHANGED:-(none)}"

          # Regex: production source, build entry points, compile config,
          # or the lockfile. Anything else doesn't move the consumer bundle.
          if echo "$CHANGED" | grep -qE '^(src/|build\.js$|modules\.js$|prebuild\.ts$|tsconfig\.json$|pnpm-lock\.yaml$)'; then
            echo "Source / build / lockfile changes detected — release needed."
            echo "RELEASE=true" >> "$GITHUB_OUTPUT"
          else
            echo "Only docs / CI / config changes since ${LAST_TAG} — skipping release."
            echo "RELEASE=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.should-release.outputs.RELEASE == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        if: steps.should-release.outputs.RELEASE == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.should-release.outputs.RELEASE == 'true'
        run: pnpm install --frozen-lockfile

      - name: Determine version bump type
        if: steps.should-release.outputs.RELEASE == 'true'
        id: bump
        run: |
          # Get the last tag, or fall back to scanning recent commits only
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            # No previous tag — this is the first CI release
            # Only look at the latest commit to determine bump type
            MESSAGES=$(git log --format="%s" -1 HEAD)
            echo "First release — scanning latest commit only"
          else
            MESSAGES=$(git log --format="%s" ${LAST_TAG}..HEAD)
            echo "Last tag: $LAST_TAG"
          fi

          echo "Commits to analyze:"
          echo "$MESSAGES"
          echo ""

          # Determine bump type from conventional commits
          # BREAKING CHANGE or feat!: / fix!: → major
          # feat: → minor
          # everything else → patch
          if echo "$MESSAGES" | grep -qiE "BREAKING CHANGE|^[a-z]+(\(.*\))?!:"; then
            echo "TYPE=major" >> $GITHUB_OUTPUT
            echo "Detected: major (breaking change)"
          elif echo "$MESSAGES" | grep -qiE "^feat(\(.*\))?:"; then
            echo "TYPE=minor" >> $GITHUB_OUTPUT
            echo "Detected: minor (new feature)"
          else
            echo "TYPE=patch" >> $GITHUB_OUTPUT
            echo "Detected: patch (fix/chore)"
          fi

      - name: Bump version
        if: steps.should-release.outputs.RELEASE == 'true'
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          pnpm version ${{ steps.bump.outputs.TYPE }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")

          # If the tag already exists, keep bumping until we find a free version
          while git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; do
            echo "Tag v${VERSION} already exists, bumping again..."
            pnpm version patch --no-git-tag-version
            VERSION=$(node -p "require('./package.json').version")
          done

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "New version: v$VERSION (was v$CURRENT)"

      - name: Build minified files
        if: steps.should-release.outputs.RELEASE == 'true'
        run: pnpm run build

      - name: Commit version bump, tag, and push
        if: steps.should-release.outputs.RELEASE == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json

          # Only commit if there are changes (avoids error on re-runs)
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore: bump version to v${{ steps.version.outputs.VERSION }} [skip ci]"
          fi

          # Create tag only if it doesn't exist locally
          if ! git tag -l "v${{ steps.version.outputs.VERSION }}" | grep -q .; then
            git tag -a "v${{ steps.version.outputs.VERSION }}" -m "v${{ steps.version.outputs.VERSION }}"
          fi

          git push && git push --tags

      - name: Create GitHub Release
        if: steps.should-release.outputs.RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            dist/*.min.js
            dist/*.min.css
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        if: steps.should-release.outputs.RELEASE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 90
